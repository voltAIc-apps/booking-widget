apiVersion: apps/v1
kind: Deployment
metadata:
  name: meetly
  labels:
    app: meetly
spec:
  replicas: 1
  selector:
    matchLabels:
      app: meetly
  template:
    metadata:
      labels:
        app: meetly
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: widget-dist
              mountPath: /usr/share/nginx/html
              readOnly: true
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /widget.js
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /widget.js
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: widget-dist
          configMap:
            name: meetly-dist
        - name: nginx-conf
          configMap:
            name: meetly-nginx-conf
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: meetly-nginx-conf
data:
  default.conf: |
    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;

      location /widget.js {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/javascript";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files /widget.js =404;
      }

      location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
      }

      location / {
        return 404;
      }
    }
